services:
  - type: web
    name: smartsach-fdt
    runtime: docker
    dockerfilePath: SmartSACH-FDT/Dockerfile
    dockerContext: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
