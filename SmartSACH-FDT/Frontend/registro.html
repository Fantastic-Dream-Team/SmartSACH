<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="./assets/css/styles.css" rel="stylesheet">
  <title>Registro - SmartSACH David</title>
</head>
<body class="bg-light">
  <main class="container py-5">
    <section class="card form-card mx-auto shadow-sm">
      <div class="card-body">
        <h1 class="h3 text-center mb-4">Creacion de cuenta</h1>
        <div id="message" class="d-none alert" role="alert"></div>
        <form id="register-form">
          <div class="row">
            <div class="col-md-6 mb-2">
              <input type="text" name="nombre" class="form-control" placeholder="Nombre" required>
            </div>
            <div class="col-md-6 mb-2">
              <input type="text" name="apellido" class="form-control" placeholder="Apellido" required>
            </div>
          </div>
          <input type="text" name="cedula" class="form-control mb-2" placeholder="Cedula" required>
          <input type="email" name="correo" class="form-control mb-2" placeholder="Correo electronico" required>
          <input type="password" name="password" class="form-control mb-2" placeholder="Contrasena" required>
          <textarea name="descripcion" class="form-control mb-3" placeholder="Ubicacion en David"></textarea>
          <button type="submit" class="btn btn-success w-100">Registrar</button>
        </form>
        <p class="mt-3 text-center"><a href="./login.html">Ya tienes cuenta? Ingresar</a></p>
      </div>
    </section>
  </main>
  <script src="./assets/js/api.js"></script>
  <script src="./assets/js/auth.js"></script>
</body>
</html>
