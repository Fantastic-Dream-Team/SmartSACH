<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="./assets/css/styles.css" rel="stylesheet">
  <title>Login - SmartSACH David</title>
</head>
<body class="auth-page">
  <main class="container auth-shell">
    <section class="card auth-card shadow">
      <div class="card-body">
        <h1 class="h4 mb-4 text-success text-center">SmartSACH David</h1>
        <div id="message" class="d-none alert" role="alert"></div>
        <form id="login-form">
          <input type="email" name="correo" class="form-control mb-3" placeholder="Correo" required>
          <input type="password" name="password" class="form-control mb-3" placeholder="Contrasena" required>
          <button type="submit" class="btn btn-success w-100">Ingresar</button>
        </form>
        <div class="mt-3 text-center">
          <a href="./registro.html">Crear cuenta</a>
        </div>
      </div>
    </section>
  </main>
  <script src="./assets/js/api.js"></script>
  <script src="./assets/js/auth.js"></script>
</body>
</html>
