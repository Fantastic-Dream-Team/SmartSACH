<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="./assets/css/styles.css" rel="stylesheet">
  <title>Panel SmartSACH</title>
</head>
<body class="bg-light">
  <nav class="navbar navbar-dark bg-success mb-4 shadow">
    <div class="container">
      <span class="navbar-brand">SmartSACH David</span>
      <span id="welcome" class="navbar-text text-white"></span>
      <button id="logout" class="btn btn-outline-light btn-sm">Salir</button>
    </div>
  </nav>

  <main class="container">
    <div id="message" class="d-none alert" role="alert"></div>
    <div class="row">
      <section class="col-md-8">
        <div class="card shadow-sm mb-4">
          <div class="card-header bg-white"><h1 class="h5 mb-0">Mis Rutas Asignadas</h1></div>
          <div class="card-body">
            <table class="table table-hover">
              <thead>
                <tr><th>Ruta</th><th>Sector</th><th>Horario</th></tr>
              </thead>
              <tbody id="routes-table"></tbody>
            </table>
          </div>
        </div>
      </section>

      <aside class="col-md-4">
        <div class="card shadow-sm border-0">
          <div class="card-body text-center">
            <h2 class="h6">Estado de Paz y Salvo</h2>
            <div id="payment-status"></div>
          </div>
        </div>
      </aside>
    </div>
  </main>
  <script src="./assets/js/api.js"></script>
  <script src="./assets/js/dashboard.js"></script>
</body>
</html>
